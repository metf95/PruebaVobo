<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Descubre — Coca-Cola</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#f2f0ed;--text:#1a1a1a;--text-muted:#999;
    --card-w:340px;--card-h:520px;
    --transition:cubic-bezier(0.22,1,0.36,1);
  }
  html,body{
    height:100%;
    font-family:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);color:var(--text);
    overflow-x:hidden;-webkit-font-smoothing:antialiased;
  }
  body.modal-open{overflow:hidden}
  body::before{
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events:none;z-index:9999;
  }

  /* HEADER */
  .header{padding:52px 28px 8px;position:relative}
  .header__title{font-size:clamp(38px,9vw,56px);font-weight:900;letter-spacing:-2px;line-height:1;color:var(--text)}
  .header__sub{font-size:14px;font-weight:300;color:var(--text-muted);margin-top:6px;letter-spacing:.3px}
  .header__search{
    position:absolute;top:56px;right:28px;width:42px;height:42px;
    border-radius:50%;border:none;background:rgba(0,0,0,0.05);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--text);transition:background .2s;
  }
  .header__search:hover{background:rgba(0,0,0,0.09)}

  /* STACK */
  .stack-section{
    position:relative;width:100%;
    height:calc(var(--card-h) + 80px);
    margin-top:20px;
    perspective:1200px;-webkit-perspective:1200px;
    cursor:grab;
  }
  .stack-section:active{cursor:grabbing}
  .stack-container{
    position:relative;width:var(--card-w);height:var(--card-h);
    margin:0 auto;
    transform-style:preserve-3d;-webkit-transform-style:preserve-3d;
  }

  /* CARD */
  .card{
    position:absolute;width:100%;height:100%;
    border-radius:28px;overflow:hidden;
    cursor:pointer;user-select:none;-webkit-user-select:none;
    transition:transform .55s var(--transition),opacity .55s var(--transition),
               box-shadow .55s var(--transition),filter .55s var(--transition);
    will-change:transform,opacity,filter;
    transform-origin:center bottom;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
  }

  /* FULL-BLEED IMAGE BACKGROUND */
  .card__img{
    position:absolute;inset:0;z-index:0;
    width:100%;height:100%;
    object-fit:cover;
    object-position:center center;
  }

  /* Gradient overlay for readability */
  .card__overlay{
    position:absolute;inset:0;z-index:1;
    background:linear-gradient(
      to top,
      rgba(0,0,0,0.72) 0%,
      rgba(0,0,0,0.25) 40%,
      rgba(0,0,0,0.05) 65%,
      rgba(0,0,0,0.0) 100%
    );
  }

  .card__bubbles{position:absolute;inset:0;overflow:hidden;z-index:2}
  .bubble{
    position:absolute;border-radius:50%;
    background:rgba(255,255,255,0.1);
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{transform:translateY(100%) scale(.4);opacity:0}
    15%{opacity:.7}85%{opacity:.3}
    100%{transform:translateY(-130%) scale(1);opacity:0}
  }

  .card__content{
    position:absolute;bottom:0;left:0;right:0;z-index:3;
    padding:28px 24px 26px;
  }
  .card__badge{
    display:inline-block;
    font-family:'Space Mono',monospace;font-size:9px;
    letter-spacing:2.5px;text-transform:uppercase;
    color:rgba(255,255,255,0.9);
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    padding:5px 14px;border-radius:100px;
    border:1px solid rgba(255,255,255,0.15);
    margin-bottom:12px;
  }
  .card__name{
    font-size:30px;font-weight:800;color:#fff;
    letter-spacing:-1px;line-height:1.08;
    text-shadow:0 2px 16px rgba(0,0,0,0.4);
  }
  .card__latin{
    font-size:13px;font-weight:300;
    color:rgba(255,255,255,0.75);
    margin-top:4px;font-style:italic;letter-spacing:.4px;
  }

  /* PLAY ICON */
  .card__play{
    position:absolute;
    top:40%;left:50%;
    transform:translate(-50%,-50%);
    z-index:4;
    width:60px;height:60px;border-radius:50%;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:2px solid rgba(255,255,255,0.3);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .3s,transform .3s var(--transition);
  }
  .card__play svg{width:22px;height:22px;fill:#fff;margin-left:3px}
  .card:hover .card__play{opacity:1;transform:translate(-50%,-50%) scale(1.08)}

  /* BOTTOM ROW */
  .bottom-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 28px 0;max-width:420px;margin:0 auto;
  }
  .dots{display:flex;gap:8px;align-items:center}
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:#ccc;border:none;cursor:pointer;
    transition:all .4s var(--transition);padding:0;
  }
  .dot.active{background:var(--text);width:26px;border-radius:4px}
  .showing-label{
    font-family:'Space Mono',monospace;
    font-size:11px;letter-spacing:1px;color:var(--text-muted);
  }

  /* NAV */
  .nav-btn{
    position:absolute;top:50%;z-index:50;
    width:50px;height:50px;border-radius:50%;border:none;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
    cursor:pointer;font-size:22px;color:var(--text);
    display:flex;align-items:center;justify-content:center;
    transition:all .25s ease;transform:translateY(-50%);
  }
  .nav-btn:hover{background:#fff;box-shadow:0 6px 28px rgba(0,0,0,0.14);transform:translateY(-50%) scale(1.06)}
  .nav-btn:active{transform:translateY(-50%) scale(.94)}
  .nav-btn--prev{left:max(12px,calc(50% - var(--card-w)/2 - 70px))}
  .nav-btn--next{right:max(12px,calc(50% - var(--card-w)/2 - 70px))}
  .nav-btn:disabled{opacity:0;pointer-events:none}
  @media(max-width:600px){.nav-btn{display:none}}

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0);
    z-index:1000;display:flex;align-items:flex-end;justify-content:center;
    pointer-events:none;transition:background .4s ease;
  }
  .modal-overlay.open{pointer-events:all;background:rgba(0,0,0,0.65)}
  .modal-sheet{
    width:100%;max-width:480px;max-height:93vh;
    background:#fff;border-radius:28px 28px 0 0;
    overflow-y:auto;transform:translateY(100%);
    transition:transform .5s var(--transition);
    overscroll-behavior:contain;
  }
  .modal-overlay.open .modal-sheet{transform:translateY(0)}
  .modal-sheet::-webkit-scrollbar{width:0}
  .modal-handle{width:38px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0}

  /* MODAL VIDEO */
  .modal-video-wrap{position:relative}
  .modal-video{
    width:100%;aspect-ratio:16/9;
    position:relative;overflow:hidden;
    background:#000;border-radius:0;
  }
  .modal-video iframe{width:100%;height:100%;border:none}
  .modal-video__poster{
    position:absolute;inset:0;z-index:2;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:opacity .4s;
  }
  .modal-video__poster img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .modal-video__poster .play-circle{
    position:relative;z-index:3;
    width:72px;height:72px;border-radius:50%;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:2px solid rgba(255,255,255,0.35);
    display:flex;align-items:center;justify-content:center;
    transition:transform .3s var(--transition),background .3s;
  }
  .modal-video__poster:hover .play-circle{transform:scale(1.1);background:rgba(255,255,255,0.28)}
  .modal-video__poster .play-circle svg{width:28px;height:28px;fill:#fff;margin-left:4px}
  .modal-video__poster.hidden{opacity:0;pointer-events:none}

  .modal-close{
    position:absolute;top:16px;right:16px;z-index:10;
    width:40px;height:40px;border-radius:50%;border:none;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    color:#fff;font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s;
  }
  .modal-close:hover{background:rgba(0,0,0,0.55)}

  .modal-body{padding:28px 26px 44px}
  .modal-body__name{font-size:30px;font-weight:800;letter-spacing:-1px}
  .modal-body__tagline{font-size:15px;color:var(--text-muted);margin-top:4px;font-weight:300}
  .modal-body__divider{width:48px;height:3px;border-radius:2px;margin:20px 0}
  .modal-body__desc{font-size:15px;line-height:1.75;color:#444}
  .modal-body__facts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
  .fact{padding:16px;border-radius:16px;background:var(--bg)}
  .fact__label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
  .fact__value{font-size:22px;font-weight:700;margin-top:4px;letter-spacing:-.5px}

  .footer{
    text-align:center;padding:40px 24px 48px;
    font-size:11px;color:#ccc;letter-spacing:1.5px;
    font-family:'Space Mono',monospace;
  }

  @media(max-width:600px){
    :root{--card-w:84vw;--card-h:500px}
    .header{padding:44px 22px 6px}
    .bottom-row{padding:16px 22px 0}
  }
</style>
</head>
<body>

<header class="header">
  <h1 class="header__title">Descubre</h1>
  <p class="header__sub">Explora nuestros refrescos</p>
  <button class="header__search" aria-label="Buscar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
  </button>
</header>

<section class="stack-section" id="stackSection">
  <button class="nav-btn nav-btn--prev" id="prevBtn" aria-label="Anterior">‹</button>
  <button class="nav-btn nav-btn--next" id="nextBtn" aria-label="Siguiente">›</button>
  <div class="stack-container" id="stackContainer"></div>
</section>

<div class="bottom-row">
  <div class="dots" id="dots"></div>
  <span class="showing-label">Showing all</span>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-video-wrap">
      <div class="modal-video" id="modalVideo">
        <div class="modal-video__poster" id="videoPoster">
          <img id="videoPosterImg" src="" alt="">
          <div class="play-circle">
            <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
          </div>
        </div>
        <iframe id="videoIframe" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
      </div>
      <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<footer class="footer">© 2026 THE COCA-COLA COMPANY</footer>

const $=id=>document.getElementById(id);
const stackContainer=$('stackContainer');
const dotsEl=$('dots');
const prevBtn=$('prevBtn');
const nextBtn=$('nextBtn');
const modalOverlay=$('modalOverlay');
const modalBody=$('modalBody');
const modalClose=$('modalClose');
const videoPoster=$('videoPoster');
const videoPosterImg=$('videoPosterImg');
const videoIframe=$('videoIframe');
const stackSection=$('stackSection');

let current=0;const total=beverages.length;let wasDragged=false;

function makeBubbles(el,n){
  el.innerHTML='';
  for(let i=0;i<n;i++){
    const b=document.createElement('div');b.className='bubble';
    const sz=3+Math.random()*14;
    b.style.cssText=`width:${sz}px;height:${sz}px;left:${5+Math.random()*90}%;bottom:${Math.random()*20}%;animation-duration:${4+Math.random()*6}s;animation-delay:${Math.random()*5}s;`;
    el.appendChild(b);
  }
}

const playSVG='<svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>';

beverages.forEach((bev,i)=>{
  const card=document.createElement('div');
  card.className='card';card.dataset.index=i;
  card.innerHTML=`
    <img class="card__img" src="${bev.img}" alt="${bev.name}" draggable="false">
    <div class="card__overlay"></div>
    <div class="card__bubbles"></div>
    <div class="card__play">${playSVG}</div>
    <div class="card__content">
      <span class="card__badge">${bev.badge}</span>
      <h2 class="card__name">${bev.name}</h2>
      <p class="card__latin">${bev.latin}</p>
    </div>
  `;
  stackContainer.appendChild(card);
  makeBubbles(card.querySelector('.card__bubbles'),8);
  card.addEventListener('click',()=>{
    if(!wasDragged&&parseInt(card.dataset.index)===current)openModal(i);
  });
  const dot=document.createElement('button');
  dot.className='dot';
  dot.setAttribute('aria-label',bev.name);
  dot.addEventListener('click',()=>goTo(i));
  dotsEl.appendChild(dot);
});

function layoutStack(){
  const cards=stackContainer.querySelectorAll('.card');
  cards.forEach((card,i)=>{
    const diff=i-current;const absDiff=Math.abs(diff);
    card.style.transition='transform .55s var(--transition),opacity .55s var(--transition),box-shadow .55s var(--transition),filter .55s var(--transition)';
    if(diff<-1){
      card.style.transform='translateX(-140%) translateZ(-100px) rotateY(12deg)';
      card.style.opacity='0';card.style.zIndex=0;card.style.filter='brightness(0.6)';
      card.style.pointerEvents='none';card.style.boxShadow='none';
    }else if(diff===-1){
      card.style.transform='translateX(-35px) translateZ(-40px) rotateY(4deg)';
      card.style.opacity='0.3';card.style.zIndex=total-absDiff;card.style.filter='brightness(0.65)';
      card.style.pointerEvents='none';card.style.boxShadow='0 4px 16px rgba(0,0,0,0.06)';
    }else if(diff===0){
      card.style.transform='translateX(0) translateZ(0) rotateY(0)';
      card.style.opacity='1';card.style.zIndex=total+2;card.style.filter='brightness(1)';
      card.style.pointerEvents='auto';card.style.boxShadow='0 20px 60px rgba(0,0,0,0.28),0 6px 20px rgba(0,0,0,0.12)';
    }else if(diff===1){
      card.style.transform='translateX(16px) translateY(12px) translateZ(-50px) scale(0.94) rotateY(-2deg)';
      card.style.opacity='1';card.style.zIndex=total-absDiff;card.style.filter='brightness(0.75)';
      card.style.pointerEvents='none';card.style.boxShadow='0 12px 40px rgba(0,0,0,0.12)';
    }else if(diff===2){
      card.style.transform='translateX(32px) translateY(24px) translateZ(-100px) scale(0.88) rotateY(-4deg)';
      card.style.opacity='0.85';card.style.zIndex=total-absDiff;card.style.filter='brightness(0.6)';
      card.style.pointerEvents='none';card.style.boxShadow='0 8px 28px rgba(0,0,0,0.08)';
    }else if(diff===3){
      card.style.transform='translateX(46px) translateY(36px) translateZ(-150px) scale(0.82) rotateY(-6deg)';
      card.style.opacity='0.55';card.style.zIndex=total-absDiff;card.style.filter='brightness(0.5)';
      card.style.pointerEvents='none';card.style.boxShadow='none';
    }else{
      card.style.transform='translateX(56px) translateY(44px) translateZ(-200px) scale(0.76) rotateY(-8deg)';
      card.style.opacity='0';card.style.zIndex=0;card.style.filter='brightness(0.4)';
      card.style.pointerEvents='none';card.style.boxShadow='none';
    }
  });
  dotsEl.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));
  prevBtn.disabled=current===0;nextBtn.disabled=current===total-1;
}

function goTo(idx){if(idx<0||idx>=total)return;current=idx;layoutStack()}
layoutStack();

prevBtn.addEventListener('click',()=>goTo(current-1));
nextBtn.addEventListener('click',()=>goTo(current+1));
document.addEventListener('keydown',e=>{
  if(modalOverlay.classList.contains('open')){if(e.key==='Escape')closeModal();return}
  if(e.key==='ArrowLeft')goTo(current-1);if(e.key==='ArrowRight')goTo(current+1);
});

// DRAG
let isDragging=false,startX=0,dragDelta=0;
function pDown(e){
  if(e.target.closest('.nav-btn,.dot'))return;
  isDragging=true;wasDragged=false;
  startX=e.type.includes('touch')?e.touches[0].clientX:e.clientX;dragDelta=0;
}
function pMove(e){
  if(!isDragging)return;
  const x=e.type.includes('touch')?e.touches[0].clientX:e.clientX;
  dragDelta=x-startX;if(Math.abs(dragDelta)>8)wasDragged=true;
  const active=stackContainer.querySelectorAll('.card')[current];
  if(active){
    const tilt=Math.max(-20,Math.min(20,dragDelta*.18));
    const shift=Math.max(-80,Math.min(80,dragDelta*.5));
    const liftY=-Math.abs(dragDelta)*.06;
    active.style.transition='none';
    active.style.transform=`translateX(${shift}px) translateY(${liftY}px) translateZ(${Math.abs(shift)*.3}px) rotateY(${-tilt*.4}deg) rotateZ(${tilt*.12}deg)`;
  }
}
function pUp(){
  if(!isDragging)return;isDragging=false;
  if(dragDelta<-50&&current<total-1)goTo(current+1);
  else if(dragDelta>50&&current>0)goTo(current-1);
  else layoutStack();dragDelta=0;
}
stackSection.addEventListener('mousedown',pDown);
stackSection.addEventListener('mousemove',pMove);
stackSection.addEventListener('mouseup',pUp);
stackSection.addEventListener('mouseleave',pUp);
stackSection.addEventListener('touchstart',pDown,{passive:true});
stackSection.addEventListener('touchmove',pMove,{passive:true});
stackSection.addEventListener('touchend',pUp);

// MODAL
function openModal(idx){
  const bev=beverages[idx];
  videoPosterImg.src=bev.img;
  videoPoster.classList.remove('hidden');
  videoIframe.src='';

  modalBody.innerHTML=`
    <h2 class="modal-body__name">${bev.name}</h2>
    <p class="modal-body__tagline">${bev.tagline}</p>
    <div class="modal-body__divider" style="background:${bev.accent}"></div>
    <p class="modal-body__desc">${bev.desc}</p>
    <div class="modal-body__facts">
      ${bev.facts.map(f=>`<div class="fact"><div class="fact__label">${f.l}</div><div class="fact__value" style="color:${bev.accent}">${f.v}</div></div>`).join('')}
    </div>
  `;

  videoPoster.onclick=()=>{
    videoPoster.classList.add('hidden');
    videoIframe.src=bev.video;
  };

  modalOverlay.classList.add('open');
  document.body.classList.add('modal-open');
}

function closeModal(){
  modalOverlay.classList.remove('open');
  document.body.classList.remove('modal-open');
  setTimeout(()=>{videoIframe.src='';},450);
}

modalClose.addEventListener('click',closeModal);
modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)closeModal()});
</script>
